    window.ELGA_WORKER_URL = 'https://elga-scanner.edhy-delaprez.workers.dev';

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Espace client Elga — portail premium (page statique sur elgaenergy.com).
   Connexion par CODE d'accès (elgaenergy.com/espace ou lien ?c=CODE).
   ═══════════════════════════════════════════════════════════════════════════ */
const SUPA=window.ELGA_SUPA_URL, KEY=window.ELGA_SUPA_KEY, WORKER=window.ELGA_WORKER_URL;
const root=document.getElementById('root');
const params=new URLSearchParams(location.search);
let STATE=null, TOKEN=null, TAB='dashboard', CHAT=[], CHAT_OPEN=false;

const euro=(n,d=0)=>n==null||isNaN(n)?null:new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:d}).format(n);
const numf=(n,d=1)=>n==null||isNaN(n)?null:new Intl.NumberFormat('fr-FR',{maximumFractionDigits:d}).format(n);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const TYPE={fixe:'Prix fixe',evolutif:'Prix évolutif',indexe:'Prix indexé',trv:'Tarif Réglementé'};
const initiales=n=>(n||'E').split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();

async function rpc(fn,body){
  const r=await fetch(`${SUPA}/rest/v1/rpc/${fn}`,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  try{return await r.json();}catch{return null;}
}
function fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=()=>rej(new Error('x'));r.readAsDataURL(f);});}
async function upload(prefixe,file){
  try{const ext=(file.name.split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'');
    const path=`espace/${TOKEN}/${prefixe}-${Date.now()}.${ext}`;
    const r=await fetch(`${SUPA}/storage/v1/object/factures/${path}`,{method:'POST',headers:{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':file.type||'application/octet-stream'},body:file});
    return r.ok?path:null;}catch{return null;}
}

/* ─── Amorçage ─── */
async function boot(){
  const c=params.get('c'), t=params.get('t');
  if(c){ root.innerHTML=loading('Ouverture de votre espace…'); const d=await rpc('espace_par_code',{p_code:c}); onState(d); return; }
  if(t){ root.innerHTML=loading('Ouverture de votre espace…'); const d=await rpc('espace_etat',{p_token:t}); onState(d); return; }
  vueLogin();
}
function onState(d){
  if(d&&d.ok){ STATE=d; TOKEN=d.token; renderApp(); }
  else vueLogin(d&&d.error);
}
function loading(txt){return `<div class="min-h-screen grid place-items-center"><div class="text-center"><div class="spin mx-auto mb-3"></div><p class="text-slate-400 text-sm">${esc(txt)}</p></div></div>`;}

/* ─── Connexion par code ─── */
function vueLogin(err){
  root.innerHTML=`
  <div class="min-h-screen grid place-items-center px-4" style="background:radial-gradient(1000px 500px at 80% -10%,#ecfdf5,transparent 55%),radial-gradient(800px 460px at -10% 10%,#eef2ff,transparent 45%),#f6f8fb">
    <div class="fade w-full max-w-md">
      <div class="text-center mb-6"><img src="/assets/logos/elga-energy-logo.png" alt="Elga Energy" class="h-9 w-auto mx-auto"/></div>
      <div class="bg-white rounded-2xl shadow-strong p-7 sm:p-8">
        <div class="mx-auto mb-4 h-13 w-13 rounded-2xl bg-primary-50 grid place-items-center" style="height:52px;width:52px">
          <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h1 class="text-[20px] font-extrabold text-slate-900 text-center">Votre espace client</h1>
        <p class="text-[13.5px] text-slate-500 mt-1.5 text-center">Entrez le code d'accès que votre conseiller Elga vous a communiqué.</p>
        <form id="fLog" class="mt-6 space-y-3">
          <input id="code" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Votre code d'accès"
            class="code-in w-full text-center text-[20px] font-bold uppercase text-slate-800 rounded-xl border-2 border-slate-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-100 outline-none py-3.5"/>
          <p id="eLog" class="text-[13px] text-rose-600 ${err?'':'hidden'}">${err?"Ce code ne correspond à aucun espace. Vérifiez-le, ou contactez votre conseiller.":''}</p>
          <button id="bLog" type="submit" disabled class="btn btn-p w-full py-3.5 text-[15px]">Accéder à mon espace</button>
        </form>
        <p class="text-[12px] text-slate-400 mt-4 text-center">Pas encore de code ? <a href="/scanner.html" class="text-primary-700 font-semibold">Faites analyser votre facture</a> ou appelez-nous.</p>
      </div>
    </div>
  </div>`;
  const code=document.getElementById('code'),b=document.getElementById('bLog'),e=document.getElementById('eLog');
  code.addEventListener('input',()=>{code.value=code.value.replace(/\s/g,'').toUpperCase().slice(0,16);b.disabled=code.value.length<4;e.classList.add('hidden');});
  code.focus();
  document.getElementById('fLog').addEventListener('submit',async ev=>{
    ev.preventDefault();b.disabled=true;b.textContent='Connexion…';
    const d=await rpc('espace_par_code',{p_code:code.value});
    if(d&&d.ok){ STATE=d;TOKEN=d.token; history.replaceState(null,'', '/espace/?c='+encodeURIComponent(code.value)); renderApp(); }
    else{ e.textContent="Ce code ne correspond à aucun espace. Vérifiez-le, ou contactez votre conseiller."; e.classList.remove('hidden'); b.textContent='Accéder à mon espace'; b.disabled=false; }
  });
}
async function recharger(){ const d=await rpc('espace_etat',{p_token:TOKEN}); if(d&&d.ok){STATE=d; renderContent();} }
function seDeconnecter(){ history.replaceState(null,'','/espace/'); location.reload(); }

/* ─── Coquille de l'app (sidebar + contenu + agent) ─── */
const NAV=[
  {id:'dashboard',label:'Tableau de bord',icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
  {id:'contrat',label:'Mon contrat',icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'},
  {id:'factures',label:'Mes factures',icon:'M9 14l6-6M9 8h.01M15 14h.01M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16l-3-2-2 2-2-2-2 2-2-2-3 2z'},
  {id:'conseiller',label:'Mon conseiller',icon:'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z'},
  {id:'parrainage',label:'Parrainage',icon:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8V6m0 8v2m0-10a9 9 0 100 18 9 9 0 000-18z'},
];
function renderApp(){
  const nom=STATE.societe||STATE.nom||'Votre espace';
  root.innerHTML=`
  <div class="min-h-screen md:flex">
    <!-- Sidebar (desktop) -->
    <aside class="hidden md:flex md:flex-col w-64 shrink-0 bg-white border-r border-slate-200 min-h-screen sticky top-0 h-screen">

        <nav id="navM" class="px-2 pb-2 flex gap-1 overflow-x-auto"></nav>

    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-4.7-7.9L21 3l-1.1 4.3A8.96 8.96 0 0121 12z"/></svg>
  </button>

  buildNav();
  document.getElementById('consSide').innerHTML=carteConseillerMini();

function buildNav(){
  const item=(n,mobile)=>`<button onclick="setTab('${n.id}')" class="navitem ${TAB===n.id?'navitem-active':'text-slate-600 hover:bg-slate-50'} ${mobile?'shrink-0 px-3 py-2 rounded-lg text-[12.5px] font-semibold whitespace-nowrap flex items-center gap-1.5':'w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13.5px] font-semibold'}">
     <svg class="${mobile?'w-4 h-4':'w-[18px] h-[18px]'} shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${n.icon}"/></svg>${esc(n.label)}</button>`;
  const d=document.getElementById('navD'), m=document.getElementById('navM');
  if(d) d.innerHTML=NAV.map(n=>item(n,false)).join('');
  if(m) m.innerHTML=NAV.map(n=>item(n,true)).join('');
}
function setTab(id){ TAB=id; buildNav(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }

/* ─── Contenu par onglet ─── */
function renderContent(){
  const el=document.getElementById('content'); if(!el) return;
  el.className='fade';
  if(TAB==='dashboard')   el.innerHTML=vueDashboard();
  else if(TAB==='contrat')el.innerHTML=vueContrat();
  else if(TAB==='factures')el.innerHTML=vueFactures();
  else if(TAB==='conseiller')el.innerHTML=vueConseiller();
  else if(TAB==='parrainage')el.innerHTML=vueParrainage();
  brancherDepots();
}

  if(localStorage.getItem('elga_parr_dismiss')==='1') return '';
  return `<div id="bParr" class="relative rounded-2xl p-4 pr-10 text-white shadow-soft mb-5 fade cursor-pointer" style="background:linear-gradient(135deg,#0b3d91,#0e8a57)" onclick="setTab('parrainage')">
    <button onclick="event.stopPropagation();document.getElementById('bParr').remove();localStorage.setItem('elga_parr_dismiss','1')" class="absolute top-2.5 right-2.5 text-white/70 hover:text-white">✕</button>
    <div class="flex items-center gap-3">
      <div class="text-2xl">🎁</div>
      <div>
        <div class="font-extrabold text-[14.5px]">Tu connais un pro qui paie trop cher ?</div>

      </div>
    </div>
  </div>`;
}

function vueContrat(){
  const c=STATE.contrat;
  if(!c) return `

        <p class="text-[14.5px] font-bold text-slate-800 mt-2">Déposer mon contrat (PDF ou photo)</p>
        <p class="text-[12.5px] text-slate-400">CGV comprises — analyse automatique</p>
      </button>
      <input id="fileContrat" type="file" accept=".pdf,image/*" class="hidden"/>
    </section>`;
  const prixVal=c.prix_kwh_base_mwh!=null?`${numf(c.prix_kwh_base_mwh)} €/MWh`:(c.prix_kwh_hph_mwh!=null?`${numf(c.prix_kwh_hph_mwh)} / ${numf(c.prix_kwh_hch_mwh)}`:null);
  const prixSub=c.prix_kwh_base_mwh!=null?`≈ ${numf(c.prix_kwh_base_mwh/10,2)} c€/kWh`:(c.prix_kwh_hph_mwh!=null?'HP / HC €/MWh':'');
  const jf=joursAvant(c.date_fin), finSub=jf!=null?(jf<0?'échéance passée':`dans ${jf} jour${jf>1?'s':''}`):'';

/* ─── Helpers d'affichage ─── */
function badgeType(t){if(!t)return '';const w=['trv','evolutif','indexe'].includes(t);return `<span class="text-[11px] font-bold px-2 py-0.5 rounded-full ${w?'bg-amber-100 text-amber-700':'bg-primary-100 text-primary-700'}">${esc(TYPE[t]||t)}</span>`;}
function tuile(label,val,accent,warn,sub){if(val==null||val==='')return '';return `<div class="tile bg-white rounded-xl border border-slate-100 p-3.5"><div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">${esc(label)}</div><div class="text-[16px] font-extrabold mt-0.5 ${accent?'text-primary-700':(warn?'text-amber-700':'text-slate-800')}">${val}</div>${sub?`<div class="text-[11.5px] text-slate-400 mt-0.5">${esc(sub)}</div>`:''}</div>`;}
function joursAvant(d){if(!d)return null;const j=Math.round((new Date(d)-new Date())/86400000);return isNaN(j)?null:j;}
function frDate(d){if(!d)return null;const x=new Date(d);return isNaN(x)?esc(d):x.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}
function frDateCourt(d){if(!d)return '—';const x=new Date(d);return isNaN(x)?esc(d):x.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});}

/* ─── Dépôts ─── */
function brancherDepots(){
  [['dropContrat','fileContrat',scanContrat],['dropFacture','fileFacture',scanFacture]].forEach(([b,i,h])=>{
    const btn=document.getElementById(b),inp=document.getElementById(i); if(!btn||!inp)return;
    btn.addEventListener('click',()=>inp.click());
    inp.addEventListener('change',e=>{if(e.target.files&&e.target.files[0])h(e.target.files[0]);});
    ['dragenter','dragover'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();btn.classList.add('drag-over');}));
    ['dragleave','drop'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();btn.classList.remove('drag-over');}));
    btn.addEventListener('drop',e=>{if(e.dataTransfer.files&&e.dataTransfer.files[0])h(e.dataTransfer.files[0]);});
  });
}
function overlay(txt){const o=document.createElement('div');o.id='ov';o.className='fixed inset-0 z-50 grid place-items-center bg-slate-900/40 backdrop-blur-sm';
  o.innerHTML=`<div class="pop bg-white rounded-2xl shadow-strong p-7 text-center w-[280px]"><div class="relative w-[84px] h-[108px] mx-auto rounded-lg bg-white border border-slate-200 overflow-hidden shadow-soft"><div class="absolute inset-x-3 top-4 space-y-1.5">${'<div class="h-1.5 rounded bg-slate-100"></div>'.repeat(6)}</div><div class="scanline"></div></div><p class="text-[14px] font-bold text-slate-800 mt-4">${esc(txt)}</p><p class="text-[12px] text-slate-400 mt-1">Quelques secondes…</p></div>`;
  document.body.appendChild(o);return ()=>document.getElementById('ov')?.remove();}
function toast(m,ok=true){const t=document.createElement('div');t.className=`fixed bottom-24 right-5 z-50 px-4 py-2.5 rounded-xl text-[13px] font-semibold text-white shadow-strong pop ${ok?'bg-primary-600':'bg-rose-600'}`;t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
async function scanContrat(file){const close=overlay('Lecture de votre contrat');try{
  const b64=await fileToB64(file);const r=await fetch(`${WORKER}/api/scan-contrat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_data:b64,file_type:file.type,file_name:file.name})});
  const j=await r.json();if(!r.ok||!j.extracted)throw 0;const path=await upload('contrat',file);const sv=await rpc('espace_save_contrat',{p_token:TOKEN,p_extracted:j.extracted,p_path:path});close();
  if(sv&&sv.ok){toast('Contrat enregistré ✓');await recharger();}else toast((sv&&sv.error)||'Enregistrement impossible',false);
}catch(e){close();toast('Lecture impossible — reprenez une photo nette.',false);}}
async function scanFacture(file){const close=overlay('Analyse de votre facture');try{
  const b64=await fileToB64(file);const r=await fetch(`${WORKER}/api/scan`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_data:b64,file_type:file.type,file_name:file.name,client_type:'professionnel'})});
  const j=await r.json();if(!r.ok)throw 0;const ex=j.multi?j.energies.electricity.extracted:j.extracted;const sv=j.multi?j.energies.electricity.savings:j.savings;
  await upload('facture',file);const res=await rpc('espace_save_facture',{p_token:TOKEN,p_extracted:ex,p_savings:sv});close();
  if(res&&res.ok){toast('Facture vérifiée ✓');await recharger();}else toast((res&&res.error)||'Enregistrement impossible',false);
}catch(e){close();toast('Lecture impossible — reprenez une photo nette.',false);}}

async function demanderRappel(btn,msg){
  if(btn){btn.disabled=true;btn.textContent='Envoi…';}
  const r=await rpc('espace_demande_rappel',{p_token:TOKEN,p_message:msg||null});
  if(r&&r.ok){toast('C\'est noté — votre conseiller vous rappelle 👍');if(btn){btn.textContent='Demande envoyée ✓';}}
  else{toast('Impossible pour le moment',false);if(btn){btn.disabled=false;btn.textContent='Être rappelé par mon conseiller';}}
}

/* ─── Assistant énergie (agent moderne) ─── */
const SUGGESTIONS=["Mon prix est-il bon ?","Comment je résilie ?","Explique ma dernière facture","Quand finit mon contrat ?"];
function toggleChat(){CHAT_OPEN=!CHAT_OPEN;renderChat();}
function escaladeBoutons(){
  const p=(STATE.conseiller&&STATE.conseiller.nom||'ton conseiller').split(' ')[0];
  return `<div class="mt-2.5 flex flex-wrap gap-1.5">
    <button onclick="demanderRappel(this)" class="text-[12px] font-bold bg-white text-primary-700 border border-primary-200 px-2.5 py-1.5 rounded-lg hover:bg-primary-50">📞 Être rappelé</button>
    <button onclick="demanderRappel(this,'souhaite prendre un rendez-vous')" class="text-[12px] font-bold bg-white text-secondary-600 border border-secondary-100 px-2.5 py-1.5 rounded-lg hover:bg-secondary-50">📅 Prendre RDV avec ${esc(p)}</button>
  </div>`;
}
function renderChat(){
  const p=document.getElementById('chatPanel');if(!p)return;
  if(!CHAT_OPEN){p.innerHTML='';return;}
  const msgs=CHAT.map(m=>m.typing
    ?`<div class="bubble bubble-a dots"><span></span><span></span><span></span></div>`
    :`<div class="fade bubble ${m.role==='user'?'bubble-u':'bubble-a'}">${esc(m.content).replace(/\n/g,'<br>')}${m.rappel?escaladeBoutons():''}</div>`).join('');
  const chips=CHAT.length?'':`<div class="flex flex-wrap gap-1.5 pt-1">${SUGGESTIONS.map(s=>`<button onclick="envoyer('${s.replace(/'/g,"\\'")}')" class="text-[12px] text-primary-700 bg-white border border-primary-200 rounded-full px-3 py-1.5 hover:bg-primary-50 transition">${esc(s)}</button>`).join('')}</div>`;
  p.innerHTML=`
  <div class="fixed inset-0 z-40 bg-black/20 sm:bg-transparent" onclick="toggleChat()"></div>
  <div class="pop fixed z-50 bottom-0 right-0 sm:bottom-24 sm:right-5 w-full sm:w-[390px] h-[86vh] sm:h-[580px] bg-white sm:rounded-3xl shadow-strong flex flex-col overflow-hidden ring-1 ring-black/5">
    <div class="p-4 text-white flex items-center justify-between" style="background:linear-gradient(135deg,#0e8a57,#0b3d91)">
      <div class="flex items-center gap-3">
        <div class="relative h-10 w-10 rounded-full bg-white/15 grid place-items-center text-[18px]">⚡<span class="absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full bg-emerald-400 ring-2 ring-[#0b6c45]"></span></div>
        <div><div class="font-bold text-[14.5px] leading-tight">Ton assistant énergie</div><div class="text-[11.5px] text-white/80">En ligne · répond à tes questions</div></div>
      </div>
      <button onclick="toggleChat()" class="text-white/80 hover:text-white text-xl leading-none">✕</button>
    </div>
    <div id="chatMsgs" class="flex-1 overflow-y-auto p-4 space-y-2.5 bg-gradient-to-b from-slate-50 to-white">
      <div class="bubble bubble-a">Salut ${esc(STATE.prenom||'')} 👋 Je suis ton assistant perso pour ton énergie. Pose-moi une question sur ton contrat, tes factures, ou l'énergie en général — je te réponds direct.</div>
      ${msgs}
      ${chips}
    </div>
    <form id="chatForm" class="p-3 border-t border-slate-100 flex gap-2 bg-white">
      <input id="chatIn" autocomplete="off" placeholder="Écris ta question…" class="flex-1 rounded-xl border border-slate-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none px-3.5 py-2.5 text-[13.5px]"/>
      <button class="btn btn-p px-4 grid place-items-center"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </form>
  </div>`;
  const box=document.getElementById('chatMsgs');if(box)box.scrollTop=box.scrollHeight;
  const form=document.getElementById('chatForm');
  if(form)form.addEventListener('submit',e=>{e.preventDefault();const inp=document.getElementById('chatIn');const q=inp.value;inp.value='';envoyer(q);});
  const inp=document.getElementById('chatIn');if(inp&&CHAT.length)inp.focus();
}
async function envoyer(q){
  q=(q||'').trim(); if(!q) return;
  CHAT.push({role:'user',content:q}); CHAT.push({typing:true}); renderChat();
  let out;
  try{
    const hist=CHAT.filter(m=>!m.typing&&m.content).map(m=>({role:m.role,content:m.content}));
    const r=await fetch(`${WORKER}/api/espace-agent`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,history:hist.slice(0,-1),contexte:{prenom:STATE.prenom,conseiller:STATE.conseiller,contrat:STATE.contrat,factures:STATE.factures}})});
    out=await r.json();
  }catch{ out={reponse:"Je préfère que ton conseiller te réponde précisément là-dessus.",rappel:true}; }
  CHAT=CHAT.filter(m=>!m.typing); CHAT.push({role:'assistant',content:out.reponse||'…',rappel:!!out.rappel}); renderChat();
}
