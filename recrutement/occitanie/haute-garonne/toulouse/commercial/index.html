<!doctype html>
<html lang="fr-FR" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>commercial toulouse — Recrutement Elga Energy</title>
  <meta name="description" content="Recrutement commercial à Toulouse. Rejoignez Elga Energy en Haute-Garonne, Occitanie." />
  <link rel="icon" href="/assets/logos/elga-energy-logo.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/logos/elga-energy-logo.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',
              600:'#0e8a57',700:'#0b6c45',800:'#0a5336',900:'#083f2a'
            }
          },
          container: { center: true, padding: '1rem' }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .seo-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    body { background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; }
    #content-annonce h2 { font-size: 1.25rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #0f172a; }
    #content-annonce h2:first-child { margin-top: 0; }
    #content-annonce p { margin-bottom: 1rem; line-height: 1.75; color: #334155; }
    #content-annonce ul { margin: 0.75rem 0 1.25rem 1.5rem; }
    #content-annonce li { margin-bottom: 0.5rem; line-height: 1.6; }
    #content-annonce hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
  </style>
</head>
<body class="antialiased text-slate-800">

  <header class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/95 backdrop-blur-sm shadow-sm">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 flex items-center justify-between py-4">
      <a href="/" class="flex items-center gap-2 transition opacity-80 hover:opacity-100">
        <img src="/assets/logos/elga-energy-logo.svg" alt="Elga Energy" class="h-10 w-auto" />
      </a>
      <nav class="flex items-center gap-6 text-sm">
        <a href="/Recrutement.html" class="text-slate-600 hover:text-primary-600 font-medium transition">Recrutement</a>
        <a href="/" class="text-slate-600 hover:text-primary-600 font-medium transition">Accueil</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 sm:px-6 py-12 sm:py-16">
    <div class="seo-hidden" aria-hidden="true">
      <p><strong>region</strong> = occitanie</p>
      <p><strong>departement</strong> = haute-garonne</p>
      <p><strong>ville</strong> = toulouse</p>
      <p><strong>metier</strong> = commercial</p>
    </div>

    <h1 class="text-3xl sm:text-4xl font-bold text-slate-900 mb-6 leading-tight">Recrutement commercial à Toulouse</h1>

    <article id="content-annonce" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 sm:p-10 mb-12 text-slate-700">
      <p class="text-slate-400">Chargement du contenu…</p>
    </article>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 sm:p-10">
      <h2 class="text-xl font-semibold text-slate-900 mb-6">Postuler à cette offre</h2>
      <form class="space-y-5">
        <div>
          <label for="nom" class="block text-sm font-medium text-slate-700 mb-2">Nom</label>
          <input type="text" id="nom" name="nom" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition" placeholder="Votre nom" required />
        </div>
        <div>
          <label for="telephone" class="block text-sm font-medium text-slate-700 mb-2">Téléphone</label>
          <input type="tel" id="telephone" name="telephone" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition" placeholder="06 00 00 00 00" required />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
          <input type="email" id="email" name="email" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-slate-900 placeholder-slate-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition" placeholder="votre@email.fr" required />
        </div>
        <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-primary-600 px-6 py-3 text-white font-semibold hover:bg-primary-700 focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition shadow-sm">Envoyer ma candidature</button>
      </form>
    </section>
  </main>

  <script>
    fetch('/CONTENT_ANNONCE.md')
      .then(r => r.text())
      .then(md => {
        const el = document.getElementById('content-annonce');
        if (typeof marked !== 'undefined') {
          el.innerHTML = marked.parse(md);
        } else {
          el.textContent = md;
        }
      })
      .catch(() => {
        document.getElementById('content-annonce').innerHTML = '<p class="text-red-600">Impossible de charger le contenu.</p>';
      });
  </script>
</body>
</html>
