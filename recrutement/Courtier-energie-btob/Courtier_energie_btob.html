<!doctype html>
<html lang="fr-FR" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Courtier-energie-btob — Recrutement Elga Energy</title>
  <meta name="description" content="Recrutement Courtier-energie-btob. Rejoignez Elga Energy en tant que courtier en énergie pour les professionnels." />
  <link rel="icon" href="/assets/logos/elga-energy-logo.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/logos/elga-energy-logo.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',
              600:'#0e8a57',700:'#0b6c45',800:'#0a5336',900:'#083f2a'
            }
          },
          container: { center: true, padding: '1rem' }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .seo-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    body { background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%); min-height: 100vh; }
    #content-annonce h2 { font-size: 1.25rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #0f172a; }
    #content-annonce h2:first-child { margin-top: 0; }
    #content-annonce p { margin-bottom: 1rem; line-height: 1.75; color: #334155; }
    #content-annonce ul { margin: 0.75rem 0 1.25rem 1.5rem; }
    #content-annonce li { margin-bottom: 0.5rem; line-height: 1.6; }
    #content-annonce hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }

    /* Sommaire */
    #sommaire {
      position: fixed;
      top: 5.5rem;
      z-index: 40;
    }

    .toc-link {
      display: block;
      padding: 0.4rem 0.85rem;
      border-left: 2px solid #e2e8f0;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.2s ease, border-color 0.2s ease, font-size 0.2s ease,
                  font-weight 0.2s ease, background 0.2s ease, transform 0.2s ease;
      transform-origin: left center;
      transform: scale(1);
      will-change: transform;
    }
    .toc-link:hover {
      color: #7dd3fc;
      border-left-color: #bae6fd;
      background: #f0f9ff;
    }
    .toc-link.active {
      color: #38bdf8;
      font-size: 0.875rem;
      font-weight: 700;
      border-left-color: #38bdf8;
      background: #f0f9ff;
      transform: scale(1.06);
    }
  </style>
</head>
<body class="antialiased text-slate-800">

  <header class="sticky top-0 z-50 border-b border-slate-200/60 bg-white/95 backdrop-blur-sm shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between py-4">
      <a href="/" class="flex items-center gap-2 transition opacity-80 hover:opacity-100">
        <img src="/assets/logos/elga-energy-logo.svg" alt="Elga Energy" class="h-10 w-auto" />
      </a>
      <nav class="flex items-center gap-6 text-sm">
        <a href="/Recrutement.html" class="text-slate-600 hover:text-primary-600 font-medium transition">Recrutement</a>
        <a href="/" class="text-slate-600 hover:text-primary-600 font-medium transition">Accueil</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-12 sm:py-16">

    <div class="flex gap-10 items-start">

      <!-- Sommaire gauche -->
      <aside class="hidden lg:block w-52 flex-shrink-0" id="toc-aside">
        <nav id="sommaire" aria-label="Sommaire de l'annonce">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4 px-3">Sommaire</p>
          <ul id="toc-list" class="space-y-0.5">
            <!-- généré dynamiquement après chargement du contenu -->
          </ul>
        </nav>
      </aside>

      <!-- Contenu principal -->
      <div class="flex-1 min-w-0">
        <h1 class="text-3xl sm:text-4xl font-bold text-slate-900 mb-10 leading-tight">Courtier-energie-btob</h1>

        <article id="content-annonce" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 sm:p-10 mb-12 text-slate-700">
          <p class="text-slate-400">Chargement du contenu…</p>
        </article>

        <section class="bg-gradient-to-br from-primary-600 to-primary-700 rounded-2xl shadow-md p-8 sm:p-10 text-white text-center">
          <p class="text-primary-100 text-sm font-medium uppercase tracking-widest mb-3">Vous avez lu jusqu'ici ?</p>
          <h2 class="text-2xl sm:text-3xl font-bold mb-4 leading-tight">Cette annonce vous parle.<br>Faites le premier pas.</h2>
          <p class="text-primary-100 mb-8 max-w-md mx-auto leading-relaxed">Inutile d'envoyer un CV. Découvrez REVELIOM et voyez si notre cadre correspond à votre manière de fonctionner.</p>
          <a href="/Recrutement.html" class="inline-flex items-center gap-2 rounded-xl bg-white text-primary-700 font-semibold px-8 py-4 text-base hover:bg-primary-50 transition shadow-sm">
            Déposer ma candidature
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
          </a>
        </section>
      </div>

    </div>
  </main>

  <script>
    function alignSidebar() {
      const aside = document.getElementById('toc-aside');
      const nav = document.getElementById('sommaire');
      if (!aside || !nav) return;
      const rect = aside.getBoundingClientRect();
      nav.style.left = rect.left + 'px';
      nav.style.width = rect.width + 'px';
    }

    document.addEventListener('DOMContentLoaded', alignSidebar);
    window.addEventListener('resize', alignSidebar);

    fetch('/CONTENT_ANNONCE.md')
      .then(r => r.text())
      .then(md => {
        const el = document.getElementById('content-annonce');
        if (typeof marked !== 'undefined') {
          el.innerHTML = marked.parse(md);
        } else {
          el.textContent = md;
        }
        hideSectionByTitle('Comment postuler');
        buildTOC();
        initScrollSpy();
        alignSidebar();
      })
      .catch(() => {
        document.getElementById('content-annonce').innerHTML = '<p class="text-red-600">Impossible de charger le contenu.</p>';
      });

    function hideSectionByTitle(title) {
      const headings = document.querySelectorAll('#content-annonce h2');
      headings.forEach(function(h) {
        if (h.textContent.trim() === title) {
          var node = h;
          while (node) {
            var next = node.nextSibling;
            node.parentNode.removeChild(node);
            node = next;
          }
        }
      });
    }

    function buildTOC() {
      const headings = document.querySelectorAll('#content-annonce h2');
      const tocList = document.getElementById('toc-list');
      tocList.innerHTML = '';

      headings.forEach(function(h, i) {
        if (!h.id) {
          h.id = 'section-' + i;
        }
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'toc-link';
        a.textContent = h.textContent;
        a.addEventListener('click', function(e) {
          e.preventDefault();
          const offset = 90;
          const top = h.getBoundingClientRect().top + window.scrollY - offset;
          window.scrollTo({ top: top, behavior: 'smooth' });
        });
        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    function initScrollSpy() {
      const headings = document.querySelectorAll('#content-annonce h2');

      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            const activeId = entry.target.id;
            document.querySelectorAll('.toc-link').forEach(function(link) {
              const isActive = link.getAttribute('href') === '#' + activeId;
              link.classList.toggle('active', isActive);
              if (isActive) {
                link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
              }
            });
          }
        });
      }, {
        rootMargin: '-15% 0px -72% 0px',
        threshold: 0
      });

      headings.forEach(function(h) { observer.observe(h); });
    }
  </script>
</body>
</html>
